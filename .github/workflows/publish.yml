name: Publish Plugins

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed plugins
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- plugins/ \
            | cut -d/ -f2 | sort -u)
          echo "plugins<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed plugins: $CHANGED"

      - name: Build and release changed plugins
        run: |
          set -e
          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            PLUGIN_DIR="plugins/$slug"
            [ ! -f "$PLUGIN_DIR/manifest.json" ] && continue

            VERSION=$(python3 -c "import json; print(json.load(open('$PLUGIN_DIR/manifest.json'))['version'])")
            TAG="${slug}-v${VERSION}"

            # Skip if tag already exists
            if git tag -l "$TAG" | grep -q "$TAG"; then
              echo "Tag $TAG already exists, skipping $slug"
              continue
            fi

            echo "=== Building $slug v$VERSION ==="

            # Build for each platform
            PLATFORMS=$(python3 -c "import json; print(' '.join(json.load(open('$PLUGIN_DIR/manifest.json'))['platforms']))")
            for platform in $PLATFORMS; do
              case "$platform" in
                mac)
                  ./scripts/build-plugin.sh "$PLUGIN_DIR" mac
                  ;;
                *)
                  echo "Skipping unsupported platform: $platform"
                  ;;
              esac
            done

            # Create git tag
            git tag "$TAG"
            git push origin "$TAG"

            # Create GitHub release
            RELEASE_NOTES="## $slug v$VERSION

$(python3 -c "import json; print(json.load(open('$PLUGIN_DIR/manifest.json'))['description'])")

**Author:** $(python3 -c "import json; print(json.load(open('$PLUGIN_DIR/manifest.json'))['author'])")
**License:** $(python3 -c "import json; print(json.load(open('$PLUGIN_DIR/manifest.json'))['license'])")
"
            ASSETS=""
            for f in dist/${slug}-${VERSION}-*.bundle.zip; do
              [ -f "$f" ] && ASSETS="$ASSETS $f"
            done

            if [ -n "$ASSETS" ]; then
              gh release create "$TAG" $ASSETS \
                --title "$slug v$VERSION" \
                --notes "$RELEASE_NOTES"
            fi

            echo "=== Published $slug v$VERSION ==="
          done <<< "${{ steps.changes.outputs.plugins }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate plugin-index.json
        run: node scripts/generate-index.mjs

      - name: Commit plugin-index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin-index.json
          git diff --cached --quiet || git commit -m "Update plugin-index.json"
          git push

      - name: Trigger website rebuild
        run: |
          gh api repos/TypeWhisper/typewhisper-web/dispatches \
            -f event_type=release-published
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
